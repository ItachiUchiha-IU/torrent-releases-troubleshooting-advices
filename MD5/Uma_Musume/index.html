<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Hash Report</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 1200px;
            margin: auto;
            background: #fff;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 { color: #2c3e50; }
        .action-btn {
            padding: 8px 12px;
            margin-bottom: 10px;
            border: none;
            border-radius: 4px;
            background: #3498db;
            color: white;
            cursor: pointer;
        }
        .action-btn:hover { background: #2980b9; }
        #scan-root {
            background-color: #ecf0f1;
            padding: 10px 15px;
            border-radius: 5px;
            font-family: "Courier New", Courier, monospace;
            word-wrap: break-word;
            margin-bottom: 20px;
        }
        #search-box {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        thead th {
            background-color: #3498db;
            color: #ffffff;
            position: sticky;
            top: 0;
        }
        tbody tr:nth-child(even) { background-color: #f2f2f2; }
        tbody tr:hover { background-color: #e8f4fd; }
        td.hash {
            font-family: "Courier New", Courier, monospace;
            color: #7f8c8d;
            cursor: pointer;
        }
        td.hash:hover {
            color: #2980b9;
            text-decoration: underline;
        }
        td.path { word-break: break-all; }
        .copied-feedback {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #2c3e50;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>File Hash Report</h1>
    <p><strong>Scanned Directory:</strong></p>
    <div id="scan-root">Loading...</div>

    <input type="text" id="search-box" placeholder="Search by hash or filename...">

    <button id="copy-all-btn" class="action-btn">Copy All (TSV)</button>
    <button id="copy-all-jsonl-btn" class="action-btn">Copy All (JSONL)</button>
    <button id="export-csv-btn" class="action-btn">Export CSV</button>
    <button id="export-jsonl-btn" class="action-btn">Export JSONL</button>

    <table id="hash-table">
        <thead>
        <tr>
            <th>Date</th>
            <th>Hash (MD5)</th>
            <th>Relative Path</th>
        </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<div id="copied-feedback" class="copied-feedback">Copied to clipboard!</div>

<script>
document.addEventListener('DOMContentLoaded', async () => {

    const tableBody = document.querySelector('#hash-table tbody');
    const scanRootDiv = document.getElementById('scan-root');
    const searchBox = document.getElementById('search-box');
    const copiedFeedback = document.getElementById('copied-feedback');

    function showCopiedFeedback(message = 'Copied to clipboard!') {
        copiedFeedback.textContent = message;
        copiedFeedback.style.opacity = '1';
        setTimeout(() => {
            copiedFeedback.style.opacity = '0';
        }, 2000);
    }

    function sanitizeFilename(name) {
        return name
            .normalize('NFKD')
            .replace(/[\\\/:*?"<>|]/g, '')
            .replace(/\s+/g, '_')
            .replace(/[^a-zA-Z0-9._-]/g, '')
            .replace(/_+/g, '_')
            .replace(/^_+|_+$/g, '')
            .toLowerCase();
    }

    let dataLines = [];

    try {
        const response = await fetch('hashes.jsonl');
        if (!response.ok) throw new Error('Failed to load hashes.jsonl');

        const text = await response.text();
        dataLines = text
            .split('\n')
            .map(l => l.trim())
            .filter(Boolean)
            .map(l => JSON.parse(l));
    } catch (err) {
        console.error(err);
        scanRootDiv.textContent = 'Failed to load hash data';
        return;
    }

    const scanRootName =
        dataLines.find(d => d.ScanRoot)?.ScanRoot ?? 'file-hash-report';

    scanRootDiv.textContent = scanRootName;
    const baseFilename = sanitizeFilename(scanRootName);

    for (const data of dataLines) {
        if (data.ScanRoot) continue;

        const row = document.createElement('tr');

        const dateCell = document.createElement('td');
        dateCell.textContent = data.Date || 'N/A';
        row.appendChild(dateCell);

        const hashCell = document.createElement('td');
        hashCell.textContent = data.Hash;
        hashCell.className = 'hash';
        hashCell.onclick = () => {
            navigator.clipboard.writeText(data.Hash).then(() => {
                showCopiedFeedback(`Copied hash: ${data.Hash.substring(0, 12)}...`);
            });
        };
        row.appendChild(hashCell);

        const pathCell = document.createElement('td');
        pathCell.textContent = data.RelativePath;
        pathCell.className = 'path';
        row.appendChild(pathCell);

        tableBody.appendChild(row);
    }

    document.getElementById('copy-all-btn').onclick = () => {
        const lines = ['Date\tHash\tRelative Path'];
        dataLines.forEach(d => {
            if (d.Hash) lines.push(`${d.Date}\t${d.Hash}\t${d.RelativePath}`);
        });
        navigator.clipboard.writeText(lines.join('\n')).then(() => {
            showCopiedFeedback('Copied all data as TSV!');
        });
    };

    document.getElementById('copy-all-jsonl-btn').onclick = () => {
        const jsonl = dataLines.filter(d => !d.ScanRoot).map(d => JSON.stringify(d)).join('\n');
        navigator.clipboard.writeText(jsonl);
    };

    document.getElementById('export-csv-btn').onclick = () => {
        const rows = [['Date','Hash','Relative Path']];
        dataLines.forEach(d => {
            if (d.Hash) rows.push([d.Date, d.Hash, d.RelativePath]);
        });
        const csv = rows.map(r => r.map(v => `"${v}"`).join(',')).join('\n');
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${baseFilename}.csv`;
        a.click();
        URL.revokeObjectURL(a.href);
    };

    document.getElementById('export-jsonl-btn').onclick = () => {
        const jsonl = dataLines.filter(d => !d.ScanRoot).map(d => JSON.stringify(d)).join('\n');
        const blob = new Blob([jsonl], { type: 'application/jsonl' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${baseFilename}.jsonl`;
        a.click();
        URL.revokeObjectURL(a.href);
    };

    searchBox.onkeyup = () => {
        const term = searchBox.value.toLowerCase();
        [...tableBody.rows].forEach(row => {
            row.style.display =
                row.cells[1].textContent.toLowerCase().includes(term) ||
                row.cells[2].textContent.toLowerCase().includes(term)
                ? '' : 'none';
        });
    };
});
</script>
</body>
</html>
