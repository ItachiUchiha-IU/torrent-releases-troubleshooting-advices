<!-- Hashes/index.html -->
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Checksum Database</title>
    <!-- Use absolute paths starting with / so they work in subfolders -->
    <link rel="stylesheet" href="/global.css">
    <script src="/navbar.js"></script>
    <style>
        /* UNIQUE STYLES FOR THE SEARCH PAGE */
        h1 { margin-top: 0; color: inherit; }

        #search { 
            width: 100%; 
            padding: 12px; 
            margin: 17px 0; 
            /* Changed to rgba and inherit so it adapts to themes */
            border: 1px solid rgba(128, 128, 128, 0.4); 
            background: rgba(128, 128, 128, 0.05);
            color: inherit;
            border-radius: 4px; 
            font-family: inherit;
        }

        ul#list { list-style: none; padding: 0; }
        ul#list li { margin: 10px 0; }
        ul#list a { font-size: 1.2em; text-decoration: none; }
    </style>
</head>
<body>
  <!-- All 7 Wrappers so Settings work here too -->
  <div id="changetextcolor">
  <div id="scaleXY">
  <div id="changemargin">
  <div id="changefontsize">
  <div id="changefontfamily">
  <div id="changefontweight">
  <div style="margin-left:1%;margin-right:1%; padding-top: 20px;">

    <h2 class="title title-mid">Releases Hashes</h2>

    <input type="text" id="search" placeholder="Search titles (e.g. Uma Musume)..." onkeyup="filterList()" style="margin-bottom: 2px;">
    
    <ul id="list">Loading...</ul>

    <script>
        let titles = [];
        // Fetch the list from the same folder
        fetch('./list.json')
            .then(res => res.json())
            .then(data => {
                titles = data;
                renderList(titles);
            });

        function renderList(items) {
            const list = document.getElementById('list');
            list.innerHTML = items.map(item => 
                // Link to view.html with the folder name as a parameter
                `<li><a href="./view.html?s=${item}">${item.replace(/_/g, ' ')}</a></li>`
            ).join('');
        }

        function filterList() {
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = titles.filter(t => t.toLowerCase().includes(query));
            renderList(filtered);
        }
    </script>

  </div></div></div></div></div></div></div> <!-- Close all 7 wrappers -->

    <br><br>
    <div align="center">
        <style>.block_container{text-align:center;} #block0, #block1, #block2 {display:inline;}</style>
        <div id="block_container">
            <div id="block0" style="float:left;transition: bottom 0.1s">
                <a href="https://www.hitwebcounter.com" target="_self"><img src="https://hitwebcounter.com/counter/counter.php?page=18678886&style=0036&nbdigits=5&type=ip&initCount=415" title="Counter Widget" Alt="Visit counter For Websites"   border="0" /></a>
            </div>
            <div id="block1">
                <script type="text/javascript" src="https://counter.websiteout.com/js/2/0/230/1"></script>
            </div>
            <div id="block2" style="float:right;transition: bottom 0.1s">
                <a href="https://www.hitwebcounter.com" target="_self"><img src="https://hitwebcounter.com/counter/counter.php?page=18678490&style=0036&nbdigits=5&type=page&initCount=590" title="Counter Widget" Alt="Visit counter For Websites"   border="0" /></a>
            </div>
        </div>
    </div>

</body>
</html>
