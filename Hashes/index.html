<!-- Hashes/index.html -->
<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/global.css">
    <script src="/navbar.js"></script>
    <title>Checksum Database</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 4px; }
        ul { list-style: none; padding: 0; }
        li { margin: 5px 0; }
        a { text-decoration: none; color: #0066cc; font-size: 1.1em; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>Release Hashes</h1>
    <input type="text" id="search" placeholder="Search titles (e.g. Uma Musume)..." onkeyup="filterList()">
    <ul id="list">Loading...</ul>

    <script>
        let titles = [];
        // This fetches the list generated by the build script
        fetch('list.json')
            .then(res => res.json())
            .then(data => {
                titles = data;
                renderList(titles);
            });

        function renderList(items) {
            const list = document.getElementById('list');
            list.innerHTML = items.map(item => 
                `<li><a href="./${item}/">${item.replace(/_/g, ' ')}</a></li>`
            ).join('');
        }

        function filterList() {
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = titles.filter(t => t.toLowerCase().includes(query));
            renderList(filtered);
        }
    </script>
</body>
</html>
