<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Hash Report</title>
    <!-- Absolute paths to ensure they work in subfolders -->
    <link rel="stylesheet" href="/global.css">
    <script src="/navbar.js"></script>
    <style>
        /* UNIQUE STYLES FOR THE HASH REPORT TABLE */
        .container {
            max-width: 1200px;
            margin: auto;
            padding: 20px 30px;
            /* Background and shadow removed so theme shows through */
        }
        h1 { color: inherit; }
        
        .action-btn {
            padding: 8px 12px;
            margin-bottom: 10px;
            border: none;
            border-radius: 4px;
            background: #3498db;
            color: white;
            cursor: pointer;
            font-family: inherit;
        }
        .action-btn:hover { background: #2980b9; }

        #scan-root {
            background-color: rgba(128, 128, 128, 0.15); 
            padding: 10px 15px;
            border-radius: 5px;
            font-family: "Courier New", Courier, monospace;
            word-wrap: break-word;
            margin-bottom: 20px;
        }

        #search-box {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid rgba(128, 128, 128, 0.4);
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
            background: rgba(128, 128, 128, 0.05);
            color: inherit;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid rgba(128, 128, 128, 0.2);
        }

        thead th {
            background-color: #3498db;
            color: #ffffff;
            position: sticky;
            top: 0;
            z-index: 5;
        }

        /* Zebra stripes that adapt to dark/light themes */
        tbody tr:nth-child(even) { background-color: rgba(128, 128, 128, 0.07); }
        tbody tr:hover { background-color: rgba(52, 152, 219, 0.15); }

        td.hash {
            font-family: "Courier New", Courier, monospace;
            color: #3498db;
            cursor: pointer;
        }
        td.hash:hover { text-decoration: underline; }
        td.path { word-break: break-all; }

        .copied-feedback {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #2c3e50;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
            z-index: 2000;
        }
    </style>
</head>
<body>
  <!-- All 7 Wrappers so Settings work here too -->
  <div id="changetextcolor">
  <div id="scaleXY">
  <div id="changemargin">
  <div id="changefontsize">
  <div id="changefontfamily">
  <div id="changefontweight">
  <div style="margin-left:1%;margin-right:1%; padding-top: 20px;">

    <div class="container">
        <h1>File Hash Report</h1>
        <p><strong>Scanned Directory:</strong></p>
        <div id="scan-root">Loading...</div>

        <input type="text" id="search-box" placeholder="Search by hash or filename...">

        <button id="copy-all-btn" class="action-btn">Copy All (TSV)</button>
        <button id="copy-all-jsonl-btn" class="action-btn">Copy All (JSONL)</button>
        <button id="export-csv-btn" class="action-btn">Export CSV</button>
        <button id="export-jsonl-btn" class="action-btn">Export JSONL</button>

        <table id="hash-table">
            <thead>
            <tr>
                <th>Date</th>
                <th>Hash (MD5)</th>
                <th>Relative Path</th>
            </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="copied-feedback" class="copied-feedback">Copied to clipboard!</div>

    <script>
    document.addEventListener('DOMContentLoaded', async () => {
        const tableBody = document.querySelector('#hash-table tbody');
        const scanRootDiv = document.getElementById('scan-root');
        const searchBox = document.getElementById('search-box');
        const copiedFeedback = document.getElementById('copied-feedback');

        function showCopiedFeedback(message = 'Copied to clipboard!') {
            copiedFeedback.textContent = message;
            copiedFeedback.style.opacity = '1';
            setTimeout(() => { copiedFeedback.style.opacity = '0'; }, 2000);
        }

        function sanitizeFilename(name) {
            return name.normalize('NFKD').replace(/[\\\/:*?"<>|]/g, '').replace(/\s+/g, '_')
                .replace(/[^a-zA-Z0-9._-]/g, '').replace(/_+/g, '_').replace(/^_+|_+$/g, '').toLowerCase();
        }

        let dataLines = [];

        try {
            const response = await fetch('hashes.jsonl');
            if (!response.ok) throw new Error('Failed to load hashes.jsonl');
            const text = await response.text();
            dataLines = text.split('\n').map(l => l.trim()).filter(Boolean).map(l => JSON.parse(l));
        } catch (err) {
            console.error(err);
            scanRootDiv.textContent = 'Failed to load hash data';
            return;
        }

        const scanRootName = dataLines.find(d => d.ScanRoot)?.ScanRoot ?? 'file-hash-report';
        scanRootDiv.textContent = scanRootName;
        const baseFilename = sanitizeFilename(scanRootName);

        for (const data of dataLines) {
            if (data.ScanRoot) continue;
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${data.Date || 'N/A'}</td>
                <td class="hash">${data.Hash}</td>
                <td class="path">${data.RelativePath}</td>
            `;
            row.querySelector('.hash').onclick = () => {
                navigator.clipboard.writeText(data.Hash).then(() => {
                    showCopiedFeedback(`Copied hash: ${data.Hash.substring(0, 12)}...`);
                });
            };
            tableBody.appendChild(row);
        }

        // Logic for buttons
        document.getElementById('copy-all-btn').onclick = () => {
            const lines = ['Date\tHash\tRelative Path'];
            dataLines.forEach(d => { if (d.Hash) lines.push(`${d.Date}\t${d.Hash}\t${d.RelativePath}`); });
            navigator.clipboard.writeText(lines.join('\n')).then(() => showCopiedFeedback('Copied all data as TSV!'));
        };

        document.getElementById('copy-all-jsonl-btn').onclick = () => {
            const jsonl = dataLines.filter(d => !d.ScanRoot).map(d => JSON.stringify(d)).join('\n');
            navigator.clipboard.writeText(jsonl).then(() => showCopiedFeedback('Copied all data as JSONL!'));
        };

        document.getElementById('export-csv-btn').onclick = () => {
            const rows = [['Date','Hash','Relative Path']];
            dataLines.forEach(d => { if (d.Hash) rows.push([d.Date, d.Hash, d.RelativePath]); });
            const csv = rows.map(r => r.map(v => `"${v}"`).join(',')).join('\n');
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${baseFilename}.csv`; a.click();
        };

        document.getElementById('export-jsonl-btn').onclick = () => {
            const jsonl = dataLines.filter(d => !d.ScanRoot).map(d => JSON.stringify(d)).join('\n');
            const blob = new Blob([jsonl], { type: 'application/jsonl' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${baseFilename}.jsonl`; a.click();
        };

        searchBox.onkeyup = () => {
            const term = searchBox.value.toLowerCase();
            [...tableBody.rows].forEach(row => {
                row.style.display = row.cells[1].textContent.toLowerCase().includes(term) || 
                                   row.cells[2].textContent.toLowerCase().includes(term) ? '' : 'none';
            });
        };
    });
    </script>

  <!-- IMPORTANT: Closing all 7 wrappers -->
  </div></div></div></div></div></div></div>
</body>
</html>
