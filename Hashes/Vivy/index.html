<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Hash Report</title>
    <!-- Use / to always point to root for shared assets -->
    <link rel="stylesheet" href="/global.css">
    <script src="/navbar.js"></script>
    <style>
        .container { max-width: 1200px; margin: auto; padding: 20px 30px; }
        h1 { color: inherit; }
        #scan-root { background-color: rgba(128, 128, 128, 0.15); padding: 10px 15px; border-radius: 5px; margin-bottom: 20px; }
        #search-box { width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid rgba(128, 128, 128, 0.4); border-radius: 4px; background: rgba(128, 128, 128, 0.05); color: inherit; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid rgba(128, 128, 128, 0.2); }
        thead th { background-color: #3498db; color: #ffffff; position: sticky; top: 0; }
        tbody tr:nth-child(even) { background-color: rgba(128, 128, 128, 0.07); }
        td.hash { font-family: monospace; color: #3498db; cursor: pointer; }
    </style>
</head>
<body>
  <!-- All 7 Wrappers -->
  <div id="changetextcolor"><div id="scaleXY"><div id="changemargin"><div id="changefontsize"><div id="changefontfamily"><div id="changefontweight">
  <div style="margin-left:1%;margin-right:1%; padding-top: 20px;">

    <div class="container">
        <h1>File Hash Report</h1>
        <p><strong>Scanned Directory:</strong></p>
        <div id="scan-root">Loading...</div>
        <input type="text" id="search-box" placeholder="Search...">
        <table id="hash-table">
            <thead><tr><th>Date</th><th>Hash (MD5)</th><th>Path</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
    // This script stays identical because it fetches 'hashes.jsonl' from the SAME folder
    document.addEventListener('DOMContentLoaded', async () => {
        const tableBody = document.querySelector('#hash-table tbody');
        const response = await fetch('hashes.jsonl');
        const text = await response.text();
        const dataLines = text.split('\n').filter(Boolean).map(JSON.parse);
        
        document.getElementById('scan-root').textContent = dataLines.find(d => d.ScanRoot)?.ScanRoot || 'Show';

        dataLines.forEach(data => {
            if (data.ScanRoot) return;
            const row = document.createElement('tr');
            row.innerHTML = `<td>${data.Date}</td><td class="hash">${data.Hash}</td><td>${data.RelativePath}</td>`;
            row.querySelector('.hash').onclick = () => navigator.clipboard.writeText(data.Hash);
            tableBody.appendChild(row);
        });
    });
    </script>

  </div></div></div></div></div></div></div>
</body>
</html>
