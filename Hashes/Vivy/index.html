<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Hash Report</title>
    <link rel="stylesheet" href="/global.css">
    <script src="/navbar.js"></script>
    <style>
        .container { margin: auto; padding: 0px 0px; }
        h1 { color: inherit; }
        .action-btn {
            padding: 8px 12px; margin: 5px 2px; border: none; border-radius: 4px;
            background: #3498db; color: white; cursor: pointer; font-family: inherit;
        }
        #scan-root { background-color: rgba(128, 128, 128, 0.15); padding: 10px 15px; border-radius: 5px; margin-top: 14px; margin-bottom: 20px; }
        #search-box {
            width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid rgba(128, 128, 128, 0.4);
            border-radius: 4px; background: rgba(128, 128, 128, 0.05); color: inherit;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9em; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid rgba(128, 128, 128, 0.2); }
        thead th { background-color: #3498db; color: #ffffff; position: sticky; top: 0; z-index: 10; }
        
        /* Specific Hash Styling */
        .hash-cell { font-family: Consolas, monospace; cursor: pointer; word-break: break-all; line-height: 1.2; }
        .md5 { color: #3498db; width: 15%; }
        .blake3 { color: #27ae60; width: 25%; } /* Green for Blake3 to distinguish */
        .path { word-break: break-all; }
        
        .copied-feedback {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            background-color: #2c3e50; color: #ffffff; padding: 12px 24px; border-radius: 8px;
            opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 99999;
            border: 1px solid #3498db; font-weight: bold;
        }
    </style>
</head>
<body>
  <div id="changetextcolor"><div id="scaleXY"><div id="changemargin"><div id="changefontsize"><div id="changefontfamily"><div id="changefontweight">
  <div style="margin-left:1%;margin-right:1%; padding-top: 20px;">

    <div class="container">
        <h2 class="title title-mid">File Hash Report</h2>
        <div id="scan-root">Loading...</div>

        <input type="text" id="search-box" placeholder="Search by hash or filename...">

        <button id="copy-all-btn" class="action-btn">Copy All (TSV)</button>
        <button id="export-csv-btn" class="action-btn">Export CSV</button>

        <table id="hash-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>MD5</th>
                    <th>BLAKE3</th>
                    <th>Path</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', async () => {
        const tableBody = document.querySelector('#hash-table tbody');
        const feedback = document.getElementById('copied-feedback');
        
        function showFeedback(msg) {
            feedback.textContent = msg; feedback.style.opacity = '1';
            setTimeout(() => { feedback.style.opacity = '0'; }, 2000);
        }

        try {
            const response = await fetch('hashes.jsonl');
            const text = await response.text();
            const dataLines = text.split('\n').filter(Boolean).map(JSON.parse);
            
            document.getElementById('scan-root').textContent = dataLines.find(d => d.ScanRoot)?.ScanRoot || 'Report';

            dataLines.forEach(data => {
                if (data.ScanRoot) return;
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${data.Date || ''}</td>
                    <td class="hash-cell md5" title="Click to copy MD5">${data.MD5 || 'N/A'}</td>
                    <td class="hash-cell blake3" title="Click to copy BLAKE3">${data.BLAKE3 || 'N/A'}</td>
                    <td class="path">${data.RelativePath}</td>
                `;
                
                // Clicking MD5 cell
                row.querySelector('.md5').onclick = () => {
                    navigator.clipboard.writeText(data.MD5).then(() => showFeedback("MD5 Copied!"));
                };
                // Clicking BLAKE3 cell
                row.querySelector('.blake3').onclick = () => {
                    navigator.clipboard.writeText(data.BLAKE3).then(() => showFeedback("BLAKE3 Copied!"));
                };
                
                tableBody.appendChild(row);
            });
        } catch (e) { console.error(e); }

        // Search logic (checks Path, MD5, and BLAKE3)
        document.getElementById('search-box').onkeyup = (e) => {
            const term = e.target.value.toLowerCase();
            [...tableBody.rows].forEach(row => {
                row.style.display = row.innerText.toLowerCase().includes(term) ? '' : 'none';
            });
        };
    });
    </script>

  </div></div></div></div></div></div></div>
  <div id="copied-feedback" class="copied-feedback">Copied!</div>
</body>
</html>
