<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Hash Report</title>
    <link rel="stylesheet" href="/global.css">
    <script src="/navbar.js"></script>
    <style>
        .container { max-width: 1200px; margin: auto; padding: 20px 10px; }
        h1 { color: inherit; }
        .action-btn {
            padding: 8px 12px; margin: 5px 2px; border: none; border-radius: 4px;
            background: #3498db; color: white; cursor: pointer; font-family: inherit;
        }
        .action-btn:hover { background: #2980b9; }
        #scan-root { background-color: rgba(128, 128, 128, 0.15); padding: 10px 15px; border-radius: 5px; margin-bottom: 20px; }
        #search-box {
            width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid rgba(128, 128, 128, 0.4);
            border-radius: 4px; background: rgba(128, 128, 128, 0.05); color: inherit;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid rgba(128, 128, 128, 0.2); }
        thead th { background-color: #3498db; color: #ffffff; position: sticky; top: 0; }
        tbody tr:nth-child(even) { background-color: rgba(128, 128, 128, 0.07); }
        td.hash { font-family: monospace; color: #3498db; cursor: pointer; word-break: break-all; }
        td.path { word-break: break-all; }
        .copied-feedback {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background-color: #2c3e50; color: white; padding: 10px 20px; border-radius: 5px;
            opacity: 0; transition: opacity 0.5s; pointer-events: none; z-index: 2000;
        }
    </style>
</head>
<body>
  <div id="changetextcolor"><div id="scaleXY"><div id="changemargin"><div id="changefontsize"><div id="changefontfamily"><div id="changefontweight">
  <div style="margin-left:1%;margin-right:1%; padding-top: 20px;">

    <div class="container">
        <h1>File Hash Report</h1>
        <p><strong>Scanned Directory:</strong></p>
        <div id="scan-root">Loading...</div>

        <input type="text" id="search-box" placeholder="Search by hash or filename...">

        <button id="copy-all-btn" class="action-btn">Copy All (TSV)</button>
        <button id="copy-all-jsonl-btn" class="action-btn">Copy All (JSONL)</button>
        <button id="export-csv-btn" class="action-btn">Export CSV</button>
        <button id="export-jsonl-btn" class="action-btn">Export JSONL</button>

        <table id="hash-table">
            <thead><tr><th>Date</th><th>Hash (MD5)</th><th>Path</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
    <div id="copied-feedback" class="copied-feedback">Copied!</div>

<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const tableBody = document.querySelector('#hash-table tbody');
        const feedback = document.getElementById('copied-feedback');
        let dataLines = [];

        function showFeedback(msg) {
            feedback.textContent = msg; feedback.style.opacity = '1';
            setTimeout(() => feedback.style.opacity = '0', 2000);
        }

        try {
            const response = await fetch('hashes.jsonl');
            const text = await response.text();
            dataLines = text.split('\n').filter(Boolean).map(JSON.parse);
            
            const scanRoot = dataLines.find(d => d.ScanRoot)?.ScanRoot || 'Report';
            document.getElementById('scan-root').textContent = scanRoot;

            dataLines.forEach(data => {
                if (data.ScanRoot) return;
                const row = document.createElement('tr');
                row.innerHTML = `<td>${data.Date || ''}</td><td class="hash">${data.Hash}</td><td class="path">${data.RelativePath}</td>`;
                row.querySelector('.hash').onclick = () => {
                    navigator.clipboard.writeText(data.Hash);
                    showFeedback("Hash Copied!");
                };
                tableBody.appendChild(row);
            });
        } catch (e) { console.error(e); }

        // --- NEW/FIXED BUTTON LOGIC ---
        document.getElementById('copy-all-btn').onclick = () => {
            const lines = dataLines.filter(d => !d.ScanRoot).map(d => `${d.Date}\t${d.Hash}\t${d.RelativePath}`);
            navigator.clipboard.writeText("Date\tHash\tPath\n" + lines.join('\n'));
            showFeedback("TSV Copied!");
        };

        document.getElementById('copy-all-jsonl-btn').onclick = () => {
            const jsonl = dataLines.filter(d => !d.ScanRoot).map(d => JSON.stringify(d)).join('\n');
            navigator.clipboard.writeText(jsonl);
            showFeedback("JSONL Copied!");
        };

        document.getElementById('export-csv-btn').onclick = () => {
            const csv = dataLines.filter(d => !d.ScanRoot).map(d => `"${d.Date}","${d.Hash}","${d.RelativePath}"`).join('\n');
            const blob = new Blob(["Date,Hash,Path\n" + csv], { type: 'text/csv' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `hashes.csv`; a.click();
        };

        document.getElementById('export-jsonl-btn').onclick = () => {
            const jsonl = dataLines.filter(d => !d.ScanRoot).map(d => JSON.stringify(d)).join('\n');
            const blob = new Blob([jsonl], { type: 'application/jsonl' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `hashes.jsonl`; a.click();
        };

        // Search logic
        document.getElementById('search-box').onkeyup = (e) => {
            const term = e.target.value.toLowerCase();
            [...tableBody.rows].forEach(row => {
                row.style.display = row.innerText.toLowerCase().includes(term) ? '' : 'none';
            });
        };
    });
    </script>

  </div></div></div></div></div></div></div>
</body>
</html>
